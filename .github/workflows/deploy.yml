name: Deploy production (Vercel)
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: vercel-prod-deploy
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_3Uy3A51AyqQpoxIBfOPE2mNi
      VERCEL_PROJECT_ID: prj_McxehNJyeesZorA5JNDW5Z57CteA
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Vercel CLI
        run: npm i -g vercel@latest
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
      - name: Strip git metadata (evita el gate de autor de Vercel, TEAM_ACCESS_REQUIRED)
        run: rm -rf .git .vercel/output/.git 2>/dev/null || true
      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
